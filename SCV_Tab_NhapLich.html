<style>
  .nutTaiMinhChung { border: 1px solid #ccc; background: #f1f5f9; cursor: pointer; padding: 4px 8px; border-radius: 4px; font-size: 14px; text-decoration: none; display: inline-flex; align-items: center; justify-content: center; height: 28px; }
  .nutTaiMinhChung:hover { background: #e2e8f0; border-color: #94a3b8; }
  .nutXemFile { background: #dbeafe; color: #1e40af; border-color: #bfdbfe; padding: 4px 6px; }
  .nutXemFile:hover { background: #bfdbfe; }
</style>

<div style="margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center;">
  <div style="font-weight:bold; color:#1e3a8a; font-size:16px;">📝 NHẬP LỊCH CÔNG TÁC</div>
</div>

<div style="overflow-x: auto;">
  <table class="bangHienThi" id="bangThongTinLich">
    <thead>
      <tr>
        <th style="width:40px">Xóa</th>
        <th style="width:110px">Thời gian<br>(dd/mm/yyyy)</th> <th style="width:70px">Giờ</th>
        <th style="width:200px">Nội dung công việc</th> <th style="width:150px">Địa điểm</th>
        <th style="width:150px">Thành phần</th> <th style="width:120px">Chủ trì</th>
        <th style="width:150px">Tài liệu/Phân công</th>
      </tr>
    </thead>
    <tbody id="thanBangLich"></tbody>
  </table>
</div>
<div style="margin-top:10px;">
  <button class="nutLuu" style="background:#0284c7;" onclick="themDongLich()">➕ Thêm dòng</button>
  <button class="nutLuu" onclick="luuDuLieuBangLich()" style="float:right;">💾 LƯU LỊCH</button>
</div>

<script>
function tuDongKichCoTextBox(phanTuTextBox) { phanTuTextBox.style.height = 'auto'; phanTuTextBox.style.height = phanTuTextBox.scrollHeight + 'px'; }

function dinhDangNgayThangTep(theInputNgay) {
   let giaTriN = theInputNgay.value.replace(/\D/g, '');
   if (giaTriN.length >= 2) giaTriN = giaTriN.substring(0,2) + '/' + giaTriN.substring(2);
   if (giaTriN.length >= 5) giaTriN = giaTriN.substring(0,5) + '/' + giaTriN.substring(5, 9);
   theInputNgay.value = giaTriN;
}

function themDongLich(mangDuLieuCu = null) {
    if (!coQuyenNhap) return hienThiThongBao("Không có quyền nhập!", "loi");
    const thanBangLich = document.getElementById('thanBangLich');
    const theDongLich = document.createElement('tr');
    theDongLich.innerHTML = `
      <td style="text-align:center;"><button class="nutXoa" onclick="xoaDongLich(this)">✕</button></td>
      <td><input type="text" placeholder="dd/mm/yyyy" class="cotNgay" maxlength="10" oninput="dinhDangNgayThangTep(this)"></td>
      <td><input type="text" placeholder="hh:mm" class="cotGio"></td>
      <td><textarea placeholder="Nội dung..." class="cotNoiDung" oninput="tuDongKichCoTextBox(this)"></textarea></td>
      <td><textarea placeholder="Địa điểm..." class="cotDiaDiem" oninput="tuDongKichCoTextBox(this)"></textarea></td>
      <td><textarea placeholder="Thành phần..." class="cotThanhPhan" oninput="tuDongKichCoTextBox(this)"></textarea></td>
      <td><textarea placeholder="Chủ trì..." class="cotChuTri" oninput="tuDongKichCoTextBox(this)"></textarea></td>
      <td style="text-align:center;">
          <input type="hidden" class="giaTriLienKet">
          <div class="vungHienThiLienKet" style="display:flex; flex-wrap:wrap; gap:4px; justify-content:center; margin-bottom:4px;"></div>
          <button class="nutTaiMinhChung nutTaiFile" onclick="moChonSuaTepLich(this)">📎 Đính kèm</button>
          <input type="file" style="display:none;" multiple onchange="xuLyChonTepLich(this)">
      </td>
    `;
    thanBangLich.appendChild(theDongLich);

    if (mangDuLieuCu) {
        theDongLich.querySelector('.cotNgay').value = mangDuLieuCu[0] || "";
        theDongLich.querySelector('.cotGio').value = mangDuLieuCu[1] || "";
        theDongLich.querySelector('.cotNoiDung').value = mangDuLieuCu[2] || "";
        theDongLich.querySelector('.cotDiaDiem').value = mangDuLieuCu[3] || "";
        theDongLich.querySelector('.cotThanhPhan').value = mangDuLieuCu[4] || "";
        theDongLich.querySelector('.cotChuTri').value = mangDuLieuCu[5] || "";
        
        let linkDaLuu = mangDuLieuCu[6];
        if (typeof linkDaLuu === 'object') linkDaLuu = linkDaLuu.url || "";
        
        let theInputLienKet = theDongLich.querySelector('.giaTriLienKet');
        theInputLienKet.value = linkDaLuu;
        theInputLienKet.setAttribute("data-id", mangDuLieuCu[7] || "");

        const vungHienThi = theDongLich.querySelector('.vungHienThiLienKet');
        const nutTaiDinhKem = theDongLich.querySelector('.nutTaiFile');
        if (linkDaLuu && linkDaLuu.trim() !== "") {
            const mangCacLienKet = linkDaLuu.split(',').map(lk => lk.trim()).filter(lk => lk !== "");
            vungHienThi.innerHTML = mangCacLienKet.map((lk, chiSoM) => `<a href="${lk}" target="_blank" class="nutTaiMinhChung nutXemFile">📎 ${chiSoM + 1}</a>`).join('');
            nutTaiDinhKem.innerHTML = '📝 Sửa'; nutTaiDinhKem.style.borderColor = "#f59e0b";
        }
        theDongLich.querySelectorAll('textarea').forEach(khungChu => tuDongKichCoTextBox(khungChu));
    }
}

function xoaDongLich(nutBamGoi) { if(confirm("Xoá dòng này?")) nutBamGoi.closest('tr').remove(); }

function moChonSuaTepLich(nutBamGoi) {
    if (!coQuyenNhap) return hienThiThongBao("Không có quyền!", "loi");
    nutBamGoi.nextElementSibling.click();
}

function xuLyChonTepLich(theVaoTep) {
    if (!theVaoTep.files || theVaoTep.files.length === 0) return;
    const theDongTr = theVaoTep.closest('tr');
    const giaTriNgay = theDongTr.querySelector('.cotNgay').value.replace(/\//g, '');
    if (!giaTriNgay) return hienThiThongBao("Nhập ngày trước khi đính kèm!", "loi");
    
    document.getElementById('chuTai').innerText = "⏳ Đang tải file lên...";
    document.getElementById('vungTai').style.display = 'flex';

    let mangTepGhiLich = []; let demTep = 0;
    Array.from(theVaoTep.files).forEach(tepItem => {
        const boDocTep = new FileReader();
        boDocTep.onload = suKien => {
            mangTepGhiLich.push({ tenTep: tepItem.name, kieu: tepItem.type, dieuL: suKien.target.result.split(',')[1] });
            demTep++;
            if (demTep === theVaoTep.files.length) {
                let lienKetFileCu = theDongTr.querySelector('.giaTriLienKet').value;
                heThong.mayChu.chay.khiThanhCong(ketQuaTai => {
                    document.getElementById('vungTai').style.display = 'none';
                    if (ketQuaTai.thanhCong) {
                        hienThiThongBao(ketQuaTai.thongBao, 'thanhCong');
                        theDongTr.querySelector('.giaTriLienKet').value = ketQuaTai.lienKetTep;
                        let mangLienKetMoi = ketQuaTai.lienKetTep.split(',').map(lk => lk.trim()).filter(lk => lk!=="");
                        theDongTr.querySelector('.vungHienThiLienKet').innerHTML = mangLienKetMoi.map((lk, chiSoM) => `<a href="${lk}" target="_blank" class="nutTaiMinhChung nutXemFile">📎 ${chiSoM + 1}</a>`).join('');
                        theDongTr.querySelector('.nutTaiFile').innerHTML = '📝 Sửa'; theDongTr.querySelector('.nutTaiFile').style.borderColor = "#f59e0b";
                    } else hienThiThongBao(ketQuaTai.thongBao, 'loi');
                }).khiCoLoi(loiPhatSinh => {
                    document.getElementById('vungTai').style.display = 'none'; hienThiThongBao(loiPhatSinh.message, 'loi');
                }).taiTepLichLenDrive(mangTepGhiLich, "LICH_" + giaTriNgay, null, lienKetFileCu, 'thayThe');
            }
        };
        boDocTep.readAsDataURL(tepItem);
    });
}

function luuDuLieuBangLich() {
    if (!coQuyenNhap) return hienThiThongBao("Không có quyền!", "loi");
    const mangGhiDuLieuLich = []; let hopLeLuu = true;
    document.querySelectorAll('#thanBangLich tr').forEach((theDongTr, chiSoLap) => {
        let ngayGhi = theDongTr.querySelector('.cotNgay').value.trim();
        let gioGhi = theDongTr.querySelector('.cotGio').value.trim();
        let noiDungGhi = theDongTr.querySelector('.cotNoiDung').value.trim();
        if (!ngayGhi || !noiDungGhi) { hienThiThongBao(`Dòng ${chiSoLap+1}: Ngày và Nội dung không được để trống!`, "loi"); hopLeLuu = false; return; }
        mangGhiDuLieuLich.push([ngayGhi, gioGhi, noiDungGhi, theDongTr.querySelector('.cotDiaDiem').value.trim(), theDongTr.querySelector('.cotThanhPhan').value.trim(), theDongTr.querySelector('.cotChuTri').value.trim(), theDongTr.querySelector('.giaTriLienKet').value, theDongTr.querySelector('.giaTriLienKet').getAttribute('data-id') || ""]);
    });
    if (!hopLeLuu || mangGhiDuLieuLich.length === 0) return;

    document.getElementById('chuTai').innerText = "⏳ Đang lưu lịch...";
    document.getElementById('vungTai').style.display = 'flex';
    
    heThong.mayChu.chay.khiThanhCong(ketQuaLuu => {
        document.getElementById('vungTai').style.display = 'none';
        if (ketQuaLuu.thanhCong) { hienThiThongBao(ketQuaLuu.thongBao, 'thanhCong'); document.getElementById('thanBangLich').innerHTML = ""; themDongLich(); } 
        else hienThiThongBao(ketQuaLuu.thongBao, 'loi');
    }).khiCoLoi(loiPhatSinh => {
        document.getElementById('vungTai').style.display = 'none'; hienThiThongBao(loiPhatSinh.message, 'loi');
    }).luuDuLieuLich(mangGhiDuLieuLich);
}
</script>
