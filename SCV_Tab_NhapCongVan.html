<style>
  .btn-icon { border: 1px solid #ccc; background: #f1f5f9; cursor: pointer; padding: 4px 8px; border-radius: 4px; font-size: 14px; text-decoration: none; display: inline-flex; align-items: center; justify-content: center; height: 28px; }
  .btn-upload-icon:hover { background: #e2e8f0; border-color: #94a3b8; }
  .btn-view-icon { background: #dbeafe; color: #1e40af; border-color: #bfdbfe; padding: 4px 6px; }
  .btn-view-icon:hover { background: #bfdbfe; }
  #tblCongVan th, #tblCongVan td { border: 1px solid #ccc !important; }
</style>

<div style="margin-bottom: 10px; overflow: hidden; display: flex; justify-content: space-between; align-items: center;">
  <div style="font-family:'Times New Roman'; font-weight:bold; color:#b91c1c; font-size:16px;">
    📂 NHẬP CÔNG VĂN ĐI / ĐẾN
  </div>
</div>

<div class="cv-controls" style="display: flex; flex-direction: row; flex-wrap: wrap; gap: 20px; align-items: center; padding: 15px; background-color: #fff1f2; border: 1px solid #fecdd3; border-radius: 8px; margin-bottom: 15px;">
  <div style="display:flex; flex-direction:column; width:150px;">
      <span style="font-size:12px; font-weight:bold; color:#be123c;">1. Loại (Đến/Đi)</span>
      <select id="nhcLoai" style="padding:5px; border:1px solid #ccc; border-radius:4px;"><option value="Đến">Văn bản Đến</option><option value="Đi">Văn bản Đi</option></select>
  </div>
  <div style="display:flex; flex-direction:column; width:150px;">
      <span style="font-size:12px; font-weight:bold; color:#be123c;">2. Cấp ban hành</span>
      <select id="nhcCap" style="padding:5px; border:1px solid #ccc; border-radius:4px;"><option value="">--Chọn--</option></select>
  </div>
  <div style="display:flex; flex-direction:column; width:150px;">
      <span style="font-size:12px; font-weight:bold; color:#be123c;">3. Lĩnh vực</span>
      <select id="nhcLvuc" style="padding:5px; border:1px solid #ccc; border-radius:4px;"><option value="">--Chọn--</option></select>
  </div>
  <div style="display:flex; flex-direction:column; width:150px;">
      <span style="font-size:12px; font-weight:bold; color:#be123c;">4. Loại văn bản</span>
      <select id="nhcLoaiVb" style="padding:5px; border:1px solid #ccc; border-radius:4px;"><option value="">--Chọn--</option></select>
  </div>
</div>

<div class="table-scroll">
  <table id="tblCongVan">
    <thead>
      <tr>
        <th style="width:40px; background-color: #b91c1c; color: white;">Xóa</th>
        <th style="width:110px; background-color: #b91c1c; color: white;">Ngày VB<br>(dd/mm/yyyy)</th>
        <th style="width:120px; background-color: #b91c1c; color: white;">Số/Ký hiệu</th>
        <th style="width:250px; background-color: #b91c1c; color: white;">Trích yếu nội dung</th>
        <th style="width:140px; background-color: #b91c1c; color: white;">Người ký</th>
        <th style="width:160px; background-color: #b91c1c; color: white;">Đính kèm File/Link</th>
        <th style="width:150px; background-color: #b91c1c; color: white;">Ghi chú</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>
<div style="margin-top:10px; overflow: hidden;">
  <button class="btn-submit" style="background:#0284c7;" onclick="themdongCv()">➕ Thêm dòng</button>
  <button class="btn-submit" onclick="luuDlCv()" style="float:right; background:#b91c1c;">💾 LƯU CÔNG VĂN</button>
</div>

<script>
function khoiTaoCv(dm) {
    const d1 = document.getElementById('nhcCap'); d1.innerHTML = '<option value="">--Chọn--</option>' + dm.nBanh.map(m => `<option value="${m}">${m}</option>`).join('');
    const d2 = document.getElementById('nhcLvuc'); d2.innerHTML = '<option value="">--Chọn--</option>' + dm.lVuc.map(m => `<option value="${m}">${m}</option>`).join('');
    const d3 = document.getElementById('nhcLoaiVb'); d3.innerHTML = '<option value="">--Chọn--</option>' + dm.lOai.map(m => `<option value="${m}">${m}</option>`).join('');
}

function themdongCv(md = null) {
    if (!window_qNhap) return hienTbao("Không có quyền!", "error");
    const tB = document.querySelector('#tblCongVan tbody');
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td style="text-align:center;"><button class="btn-delete" onclick="xoadoCv(this)">✕</button></td>
      <td><input type="text" placeholder="dd/mm/yyyy" class="cNgay" maxlength="10" oninput="theTepL(this)"></td>
      <td><textarea class="cSo" placeholder="Số/Ký hiệu..." oninput="tdKichCo(this)"></textarea></td>
      <td><textarea class="cNdung" placeholder="Trích yếu..." oninput="tdKichCo(this)"></textarea></td>
      <td><textarea class="cNky" placeholder="Người ký..." oninput="tdKichCo(this)"></textarea></td>
      <td style="text-align:center;">
          <input type="hidden" class="val-link">
          <input type="hidden" class="val-id">
          <div class="link-display-area" style="display:flex; flex-wrap:wrap; gap:4px; justify-content:center; margin-bottom:4px;"></div>
          <button class="btn-icon btn-upload-icon nTai" onclick="moHopThoaiTaiCv(this)">📎 Đính kèm</button>
      </td>
      <td><textarea class="cGc" placeholder="Ghi chú..." oninput="tdKichCo(this)"></textarea></td>
    `;
    tB.appendChild(tr);

    if (md) {
        tr.querySelector('.cNgay').value = md[0] || "";
        tr.querySelector('.cSo').value = md[1] || "";
        tr.querySelector('.cNdung').value = md[2] || "";
        tr.querySelector('.cNky').value = md[3] || "";
        tr.querySelector('.cGc').value = md[5] || "";
        
        let cLk = md[4];
        if (typeof cLk === 'object') cLk = cLk.url || "";
        
        tr.querySelector('.val-link').value = cLk; 
        tr.querySelector('.val-id').value = md[6] || "";

        const vHt = tr.querySelector('.link-display-area'); 
        const ntTai = tr.querySelector('.nTai');
        if (cLk && cLk.trim() !== "") {
            const cls = cLk.split(',').map(l => l.trim()).filter(l => l !== "");
            vHt.innerHTML = cls.map((l, i) => `<a href="${l}" target="_blank" class="btn-icon btn-view-icon">📎 File ${i + 1}</a>`).join('');
            ntTai.innerHTML = '📝 Sửa/Thêm'; ntTai.style.borderColor = "#f59e0b";
        }
        tr.querySelectorAll('textarea').forEach(tx => tdKichCo(tx));
    }
}

function xoadoCv(nt) { if(confirm("Xoá dòng này?")) nt.closest('tr').remove(); }

function luuDlCv() {
    if (!window_qNhap) return hienTbao("Không có quyền!", "error");
    const l1 = document.getElementById('nhcLoai').value;
    const l2 = document.getElementById('nhcCap').value;
    const l3 = document.getElementById('nhcLvuc').value;
    const l4 = document.getElementById('nhcLoaiVb').value;
    
    if (!l1 || !l2 || !l3 || !l4) return hienTbao("Vui lòng chọn đầy đủ 4 ô Phân loại phía trên!", "error");

    const mG = []; let hLp = true;
    document.querySelectorAll('#tblCongVan tbody tr').forEach((tr, i) => {
        let ng = tr.querySelector('.cNgay').value.trim();
        let so = tr.querySelector('.cSo').value.trim();
        let nd = tr.querySelector('.cNdung').value.trim();
        if (!ng || !so || !nd) { hienTbao(`Dòng ${i+1}: Ngày, Số và Trích yếu không được trống!`, "error"); hLp = false; return; }
        mG.push([l1, l2, l3, l4, ng, so, nd, tr.querySelector('.cNky').value.trim(), tr.querySelector('.val-link').value, tr.querySelector('.cGc').value.trim(), new Date().toLocaleDateString('vi-VN'), tr.querySelector('.val-id').value || ""]);
    });
    if (!hLp || mG.length === 0) return;

    document.getElementById('loading-text').innerText = "⏳ Đang lưu công văn...";
    document.getElementById('loading-overlay').style.display = 'flex';
    
    heThong.server.chay.voiKhiTcong(k => {
        document.getElementById('loading-overlay').style.display = 'none';
        if (k.tCong) { hienTbao(k.tBao, 'success'); document.querySelector('#tblCongVan tbody').innerHTML = ""; themdongCv(); } 
        else hienTbao(k.tBao, 'error');
    }).voiKhiLoi(l => {
        document.getElementById('loading-overlay').style.display = 'none'; hienTbao(l.message, 'error');
    }).cvLuuCv(mG);
}
</script>
