<div style="margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center;">
  <div style="font-weight:bold; color:#b91c1c; font-size:16px;">📂 NHẬP CÔNG VĂN ĐI / ĐẾN</div>
</div>

<div style="display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 10px; background:#fff1f2; padding:10px; border-radius:6px; border:1px solid #fecdd3;">
  <div style="display:flex; flex-direction:column; width:150px;">
      <span style="font-size:12px; font-weight:bold; color:#be123c;">1. Loại (Đến/Đi)</span>
      <select id="nhcLoai" style="padding:5px; border:1px solid #ccc; border-radius:4px;"><option value="Đến">Văn bản Đến</option><option value="Đi">Văn bản Đi</option></select>
  </div>
  <div style="display:flex; flex-direction:column; width:150px;">
      <span style="font-size:12px; font-weight:bold; color:#be123c;">2. Cấp ban hành</span>
      <select id="nhcCap" style="padding:5px; border:1px solid #ccc; border-radius:4px;"><option value="">--Chọn--</option></select>
  </div>
  <div style="display:flex; flex-direction:column; width:150px;">
      <span style="font-size:12px; font-weight:bold; color:#be123c;">3. Lĩnh vực</span>
      <select id="nhcLvuc" style="padding:5px; border:1px solid #ccc; border-radius:4px;"><option value="">--Chọn--</option></select>
  </div>
  <div style="display:flex; flex-direction:column; width:150px;">
      <span style="font-size:12px; font-weight:bold; color:#be123c;">4. Loại văn bản</span>
      <select id="nhcLoaiVb" style="padding:5px; border:1px solid #ccc; border-radius:4px;"><option value="">--Chọn--</option></select>
  </div>
</div>

<div style="overflow-x: auto;">
  <table class="bangHthi" id="bangCv">
    <thead style="background-color: #b91c1c !important;">
      <tr>
        <th style="width:40px; background-color: #b91c1c; color: white;">Xóa</th>
        <th style="width:110px; background-color: #b91c1c; color: white;">Ngày VB<br>(dd/mm/yyyy)</th>
        <th style="width:120px; background-color: #b91c1c; color: white;">Số/Ký hiệu</th>
        <th style="width:250px; background-color: #b91c1c; color: white;">Trích yếu nội dung</th>
        <th style="width:140px; background-color: #b91c1c; color: white;">Người ký</th>
        <th style="width:160px; background-color: #b91c1c; color: white;">Đính kèm File/Link</th>
        <th style="width:150px; background-color: #b91c1c; color: white;">Ghi chú</th>
      </tr>
    </thead>
    <tbody id="tBodyCv"></tbody>
  </table>
</div>
<div style="margin-top:10px;">
  <button class="nutLuu" style="background:#0284c7;" onclick="themdongCv()">➕ Thêm dòng</button>
  <button class="nutLuu" onclick="luuDlCv()" style="float:right; background:#b91c1c;">💾 LƯU CÔNG VĂN</button>
</div>

<script>
function khoiTaoCv(dm) {
    const d1 = document.getElementById('nhcCap'); d1.innerHTML = '<option value="">--Chọn--</option>' + dm.nBanh.map(m => `<option value="${m}">${m}</option>`).join('');
    const d2 = document.getElementById('nhcLvuc'); d2.innerHTML = '<option value="">--Chọn--</option>' + dm.lVuc.map(m => `<option value="${m}">${m}</option>`).join('');
    const d3 = document.getElementById('nhcLoaiVb'); d3.innerHTML = '<option value="">--Chọn--</option>' + dm.lOai.map(m => `<option value="${m}">${m}</option>`).join('');
}

function themdongCv(md = null) {
    if (!qNhap) return hienTbao("Không có quyền!", "loi");
    const tB = document.getElementById('tBodyCv');
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td style="text-align:center;"><button class="nutXoa" onclick="xoadoCv(this)">✕</button></td>
      <td><input type="text" placeholder="dd/mm/yyyy" class="cNgay" maxlength="10" oninput="theTepL(this)"></td>
      <td><textarea class="cSo" placeholder="Số/Ký hiệu..." oninput="tdKichCo(this)"></textarea></td>
      <td><textarea class="cNdung" placeholder="Trích yếu..." oninput="tdKichCo(this)"></textarea></td>
      <td><textarea class="cNky" placeholder="Người ký..." oninput="tdKichCo(this)"></textarea></td>
      <td style="text-align:center;">
          <input type="hidden" class="gLk">
          <div class="vungHthiLk" style="display:flex; flex-wrap:wrap; gap:4px; justify-content:center; margin-bottom:4px;"></div>
          <button class="nutTaiMinhc nTai" onclick="moHopThoaiTaiCv(this)">📎 Đính kèm</button>
      </td>
      <td><textarea class="cGc" placeholder="Ghi chú..." oninput="tdKichCo(this)"></textarea></td>
    `;
    tB.appendChild(tr);

    if (md) {
        tr.querySelector('.cNgay').value = md[0] || "";
        tr.querySelector('.cSo').value = md[1] || "";
        tr.querySelector('.cNdung').value = md[2] || "";
        tr.querySelector('.cNky').value = md[3] || "";
        tr.querySelector('.cGc').value = md[5] || "";
        
        let cLk = md[4];
        if (typeof cLk === 'object') cLk = cLk.url || "";
        
        let nG = tr.querySelector('.gLk'); nG.value = cLk; nG.setAttribute("data-id", md[6] || "");

        const vHt = tr.querySelector('.vungHthiLk'); const ntTai = tr.querySelector('.nTai');
        if (cLk && cLk.trim() !== "") {
            const cls = cLk.split(',').map(l => l.trim()).filter(l => l !== "");
            vHt.innerHTML = cls.map((l, i) => `<a href="${l}" target="_blank" class="nutTaiMinhc nutXemFile">📎 ${i + 1}</a>`).join('');
            ntTai.innerHTML = '📝 Sửa'; ntTai.style.borderColor = "#f59e0b";
        }
        tr.querySelectorAll('textarea').forEach(tx => tdKichCo(tx));
    }
}

function xoadoCv(nt) { if(confirm("Xoá dòng này?")) nt.closest('tr').remove(); }

function luuDlCv() {
    if (!qNhap) return hienTbao("Không có quyền!", "loi");
    const l1 = document.getElementById('nhcLoai').value;
    const l2 = document.getElementById('nhcCap').value;
    const l3 = document.getElementById('nhcLvuc').value;
    const l4 = document.getElementById('nhcLoaiVb').value;
    
    if (!l1 || !l2 || !l3 || !l4) return hienTbao("Vui lòng chọn đầy đủ 4 ô Phân loại phía trên!", "loi");

    const mG = []; let hLp = true;
    document.querySelectorAll('#tBodyCv tr').forEach((tr, i) => {
        let ng = tr.querySelector('.cNgay').value.trim();
        let so = tr.querySelector('.cSo').value.trim();
        let nd = tr.querySelector('.cNdung').value.trim();
        if (!ng || !so || !nd) { hienTbao(`Dòng ${i+1}: Ngày, Số và Trích yếu không được trống!`, "loi"); hLp = false; return; }
        mG.push([l1, l2, l3, l4, ng, so, nd, tr.querySelector('.cNky').value.trim(), tr.querySelector('.gLk').value, tr.querySelector('.cGc').value.trim(), new Date().toLocaleDateString('vi-VN'), tr.querySelector('.gLk').getAttribute('data-id') || ""]);
    });
    if (!hLp || mG.length === 0) return;

    document.getElementById('chuTai').innerText = "⏳ Đang lưu công văn...";
    document.getElementById('vungTai').style.display = 'flex';
    
    heThong.server.chay.voiKhiTcong(k => {
        document.getElementById('vungTai').style.display = 'none';
        if (k.tCong) { hienTbao(k.tBao, 'tc'); document.getElementById('tBodyCv').innerHTML = ""; themdongCv(); } 
        else hienTbao(k.tBao, 'loi');
    }).voiKhiLoi(l => {
        document.getElementById('vungTai').style.display = 'none'; hienTbao(l.message, 'loi');
    }).cvLuuCv(mG);
}
</script>
