<div style="margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center;">
  <span style="font-weight:bold; font-size:15px; color:#1e3a8a;">👋 Mời chọn điều kiện để tìm kiếm...</span>
</div>

<div style="display:flex; flex-wrap:wrap; gap:10px; align-items:center; padding:10px; background:#e0f2fe; border:1px solid #bae6fd; margin-bottom:10px;">
    <select id="tcLoai" style="padding:5px; border-radius:4px; border:1px solid #ccc;" onchange="taiDlTraCuuCv()"><option value="">-- Chiều (Đến/Đi) --</option><option value="Đến">Văn bản Đến</option><option value="Đi">Văn bản Đi</option></select>
    <select id="tcCap" style="padding:5px; border-radius:4px; border:1px solid #ccc;" onchange="taiDlTraCuuCv()"><option value="">-- CQ Ban Hành --</option></select>
    <select id="tcLoaiVb" style="padding:5px; border-radius:4px; border:1px solid #ccc;" onchange="taiDlTraCuuCv()"><option value="">-- Loại VB --</option></select>
    <div style="display:flex; align-items:center; gap:5px; background:white; padding:3px; border-radius:4px; border:1px solid #ccc;">
        <span style="font-size:12px; font-weight:bold; padding-left:5px;">Từ:</span>
        <input type="text" id="tcTuN" placeholder="dd/mm/yyyy" maxlength="10" oninput="theTepL(this)" style="border:none; outline:none; width:75px; text-align:center;">
    </div>
    <div style="display:flex; align-items:center; gap:5px; background:white; padding:3px; border-radius:4px; border:1px solid #ccc;">
        <span style="font-size:12px; font-weight:bold; padding-left:5px;">Đến:</span>
        <input type="text" id="tcDenN" placeholder="dd/mm/yyyy" maxlength="10" oninput="theTepL(this)" style="border:none; outline:none; width:75px; text-align:center;">
    </div>
    <input type="text" id="tcTuKhoa" placeholder="Gõ Trích yếu / Số KH..." style="padding:5px; border-radius:4px; border:1px solid #ccc; width:160px;" onkeydown="if(event.key==='Enter')taiDlTraCuuCv()">
    <button onclick="taiDlTraCuuCv()" style="background:#2563eb; color:white; border:none; padding:5px 15px; border-radius:4px; font-weight:bold; cursor:pointer;">🔍 Lọc</button>
</div>

<div style="overflow-x: auto; max-height: 65vh;">
  <table class="bangHthi" id="bangXemCv">
    <thead style="position: sticky; top: 0; z-index: 10;">
      <tr>
        <th style="width:90px;">Ngày VB</th>
        <th style="width:110px;">Số/Ký hiệu</th>
        <th style="width:250px;">Trích yếu nội dung</th>
        <th style="width:120px;">Nơi/Người ký</th>
        <th style="width:100px;">Chi tiết</th>
        <th style="width:60px;">Làm việc</th>
      </tr>
    </thead>
    <tbody id="tBodyXemCv">
      <tr><td colspan="6" style="text-align:center; font-style:italic; color:#666;">Chưa có dữ liệu</td></tr>
    </tbody>
  </table>
</div>

<script>
  let dlGocCv = [];

  function khoiTaoTimCv(dm) {
      const d1 = document.getElementById('tcCap'); d1.innerHTML = '<option value="">-- CQ Ban Hành --</option>' + dm.nBanh.map(m => `<option value="${m}">${m}</option>`).join('');
      const d2 = document.getElementById('tcLoaiVb'); d2.innerHTML = '<option value="">-- Loại VB --</option>' + dm.lOai.map(m => `<option value="${m}">${m}</option>`).join('');
  }

  function taiDlTraCuuCv() {
      document.getElementById('chuTai').innerText = "⏳ Đang lấy dữ liệu...";
      document.getElementById('vungTai').style.display = 'flex';
      heThong.server.chay.voiKhiTcong(kq => {
          document.getElementById('vungTai').style.display = 'none';
          dlGocCv = kq; veBangCv();
      }).voiKhiLoi(l => {
          document.getElementById('vungTai').style.display = 'none'; hienTbao("Lỗi: " + l.message, "loi");
      }).cvLayDlCv();
  }

  function veBangCv() {
      const tb = document.getElementById('tBodyXemCv'); tb.innerHTML = '';
      
      let t1 = document.getElementById('tcLoai').value.trim();
      let t2 = document.getElementById('tcCap').value.trim();
      let t3 = document.getElementById('tcLoaiVb').value.trim();
      let nT = tachNgay(document.getElementById('tcTuN').value);
      let nD = tachNgay(document.getElementById('tcDenN').value);
      let tk = document.getElementById('tcTuKhoa').value.trim().toLowerCase();

      let dLoc = dlGocCv.filter(r => {
          if(t1 && String(r[0]).trim() !== t1) return false;
          if(t2 && String(r[1]).trim() !== t2) return false;
          if(t3 && String(r[3]).trim() !== t3) return false;
          
          let n = tachNgay(r[4]);
          if(nT > 0 && n < nT) return false;
          if(nD > 0 && n > nD) return false;

          if(tk) {
              let so = String(r[5]).toLowerCase();
              let ty = String(r[6]).toLowerCase();
              if(!so.includes(tk) && !ty.includes(tk)) return false;
          }
          return true;
      });

      dLoc.sort((a,b) => tachNgay(b[4]) - tachNgay(a[4]));

      if(dLoc.length === 0) { tb.innerHTML = '<tr><td colspan="6" style="text-align:center;">Không tìm thấy!</td></tr>'; return; }

      dLoc.forEach(r => {
          let nutSua = qNhap ? `<button class="nutXoa" style="color:#0369a1; border-color:#38bdf8; background:#e0f2fe;" onclick="chuyenSangSuaCv(this, '${encodeURIComponent(JSON.stringify(r))}')" title="Sửa dòng này">✏️</button>` : '';
          let dsL = "";
          let lkT = r[8]; if(typeof lkT === 'object') lkT = lkT.url || "";
          if (lkT && lkT.trim() !== "") {
              let cls = lkT.split(',').map(l => l.trim()).filter(l => l !== "");
              dsL = cls.map((l, i) => `<a href="${l}" target="_blank" class="nutTaiMinhc nutXemFile">📎 File ${i+1}</a>`).join('');
          }
          
          let mau = String(r[0]).trim() === "Đến" ? "color:#b91c1c;" : "color:#047857;";
          
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td style="text-align:center; font-weight:bold;">${r[4]}<br><span style="${mau} font-size:12px;">[VB ${r[0]}]</span></td>
            <td style="font-weight:bold; color:#1e3a8a; text-align:center;">${r[5]}</td>
            <td style="font-weight:bold;">${r[6]}</td>
            <td style="text-align:center;">${r[7]}</td>
            <td style="text-align:center; font-size:12px;">${dsL}</td>
            <td style="text-align:center;">${nutSua}</td>
          `;
          tb.appendChild(tr);
      });
  }

  function chuyenSangSuaCv(btn, mh) {
       try {
           const dG = JSON.parse(decodeURIComponent(mh));
           document.querySelectorAll('.noiDungTab').forEach(e => e.classList.remove('dangMo'));
           document.querySelectorAll('.nutChuyen').forEach(e => e.classList.remove('dangMo'));
           document.getElementById('tabCv').classList.add('dangMo');
           document.querySelectorAll('.nutChuyen')[1].classList.add('dangMo');
           themdongCv(dG);
           const tr = btn.closest('tr'); tr.style.backgroundColor = '#fef9c3'; setTimeout(() => tr.remove(), 500);
           hienTbao("Đã chuyển sang Nhập Công Văn!", "tc");
       } catch(e) { hienTbao("Lỗi đọc dữ liệu!", "loi"); }
  }
</script>
