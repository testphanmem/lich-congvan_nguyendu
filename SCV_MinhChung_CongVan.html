<style>
  #hopTaiCongVan { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 10006; justify-content: center; align-items: center; }
  .hopKhung { background: #fff; padding: 20px; border-radius: 8px; width: 450px; max-width: 95%; box-shadow: 0 4px 6px rgba(0,0,0,0.1); font-family: 'Times New Roman', serif; }
  .hopTieuDe { border-bottom: 1px solid #eee; padding-bottom: 10px; margin-bottom: 15px; text-align: center; font-weight: bold; color: #0891b2; font-size: 18px; }
  .vungThaTep { border: 2px dashed #ccc; padding: 20px; text-align: center; cursor: pointer; border-radius: 6px; transition: 0.3s; background: #fafafa; margin-bottom: 15px; }
  .vungThaTep:hover { border-color: #0891b2; background: #f0f9ff; }
  .nutDongHopThoai { width: 100%; padding: 10px; background: #64748b; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 10px; }
  .nutBatDauTai { width: 100%; padding: 10px; background: #0891b2; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; opacity: 0.5; pointer-events: none; }
  .nutBatDauTai.dangMo { opacity: 1; pointer-events: auto; }
</style>

<div id="hopTaiCongVan">
  <div class="hopKhung">
    <div class="hopTieuDe">📁 TẢI TÀI LIỆU CÔNG VĂN</div>
    
    <div style="margin-bottom: 10px; font-weight: bold; font-size: 13px;">1. Chọn thư mục lưu:</div>
    <select id="chonThuMucCongVan" style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; margin-bottom: 15px;"></select>
    
    <div style="margin-bottom: 10px; font-weight: bold; font-size: 13px;">2. Chế độ lưu:</div>
    <div style="display: flex; gap: 15px; margin-bottom: 15px; background: #f1f5f9; padding: 10px; border-radius: 6px;">
        <label><input type="radio" name="cheDoGhiCongVan" value="thayThe" checked> Thay thế file cũ</label>
        <label><input type="radio" name="cheDoGhiCongVan" value="themTiep"> Thêm tiếp file</label>
    </div>

    <div class="vungThaTep" onclick="document.getElementById('nhapTepCongVan').click()">
      <span id="nhanTepCongVan">Nhấn để chọn thư mục/files</span>
      <input type="file" id="nhapTepCongVan" style="display:none" webkitdirectory directory multiple onchange="daChonTepCongVan(this)">
    </div>

    <div id="trangThaiCongVan" style="text-align:center; font-weight:bold; min-height:20px; font-size:13px; color:#333; margin-bottom:10px;"></div>
    
    <button id="nutBatDauTaiCongVan" class="nutBatDauTai" onclick="thucHienTaiCongVan()">BẮT ĐẦU TẢI LÊN</button>
    <button class="nutDongHopThoai" onclick="dongHopThoaiTaiCongVan()">ĐÓNG</button>
  </div>
</div>

<script>
  let theNguonCongVan = null;
  let tepDuocChonCongVan = [];
  let lienKetCuCongVan = "";

  function moHopThoaiTaiCongVan(nutBam) {
      if (!coQuyenNhap) return hienThiThongBao("Không có quyền!", "loi");
      const theDong = nutBam.closest('tr');
      const soCongVan = theDong.querySelector('.cotSo').value.trim();
      if (!soCongVan) return hienThiThongBao("Vui lòng nhập 'Số/Ký hiệu' trước khi đính kèm!", "loi");
      
      theNguonCongVan = nutBam;
      lienKetCuCongVan = theDong.querySelector('.giaTriLienKet').value;
      
      document.getElementById('trangThaiCongVan').innerText = "Đang quét thư mục Drive...";
      document.getElementById('hopTaiCongVan').style.display = 'flex';
      
      heThong.mayChu.chay.khiThanhCong(ketQua => {
          const hopChonThuMuc = document.getElementById('chonThuMucCongVan'); hopChonThuMuc.innerHTML = "";
          if (ketQua.thanhCong && ketQua.duLieu.length > 0) {
              ketQua.duLieu.forEach(thuMuc => { hopChonThuMuc.add(new Option("📂 " + thuMuc.ten, thuMuc.idTam)); });
              document.getElementById('trangThaiCongVan').innerText = "Sẵn sàng.";
          } else document.getElementById('trangThaiCongVan').innerText = "Không tìm thấy thư mục.";
      }).layThuMucCon();
  }

  function dongHopThoaiTaiCongVan() {
      document.getElementById('hopTaiCongVan').style.display = 'none';
      document.getElementById('trangThaiCongVan').innerText = "";
      document.getElementById('nhapTepCongVan').value = "";
      document.getElementById('nhanTepCongVan').innerText = "Nhấn để chọn thư mục/files";
      document.getElementById('nutBatDauTaiCongVan').classList.remove('dangMo');
      tepDuocChonCongVan = []; lienKetCuCongVan = ""; theNguonCongVan = null;
  }

  function daChonTepCongVan(theDauVao) {
      if (theDauVao.files.length > 0) {
          tepDuocChonCongVan = theDauVao.files;
          const tenThuMucKiem = tepDuocChonCongVan[0].webkitRelativePath.split('/')[0] || "Các files";
          document.getElementById('nhanTepCongVan').innerText = `📂 ${tenThuMucKiem} (${tepDuocChonCongVan.length} files)`;
          document.getElementById('nutBatDauTaiCongVan').classList.add('dangMo');
          document.getElementById('trangThaiCongVan').innerText = "Đã chọn xong. Sẵn sàng tải.";
      }
  }

  function thucHienTaiCongVan() {
      if (!tepDuocChonCongVan || tepDuocChonCongVan.length === 0) return;
      const nutBatDau = document.getElementById('nutBatDauTaiCongVan'); const theTrangThai = document.getElementById('trangThaiCongVan');
      const idThuMucChon = document.getElementById('chonThuMucCongVan').value;
      const cheDoGhiChon = document.querySelector('input[name="cheDoGhiCongVan"]:checked').value;
      const soCongVanLay = theNguonCongVan.closest('tr').querySelector('.cotSo').value.trim().replace(/[\\/:*?"<>|]/g, '_');
      const tenThuMucMoiLuu = soCongVanLay + "_" + tepDuocChonCongVan[0].webkitRelativePath.split('/')[0];
      
      nutBatDau.classList.remove('dangMo'); theTrangThai.style.color = "blue"; theTrangThai.innerText = `⏳ Đang đọc ${tepDuocChonCongVan.length} file...`;
      
      let mangTepGhi = []; let demTep = 0;
      Array.from(tepDuocChonCongVan).forEach(tepItem => {
          const boDocTep = new FileReader();
          boDocTep.onload = suKien => {
              mangTepGhi.push({ tenTep: tepItem.name, kieu: tepItem.type, dieuL: suKien.target.result.split(',')[1] });
              demTep++;
              if (demTep === tepDuocChonCongVan.length) {
                  theTrangThai.innerText = "⏳ Đang gửi dữ liệu lên Drive...";
                  heThong.mayChu.chay.khiThanhCong(ketQua => {
                      if (ketQua.thanhCong) {
                          theTrangThai.style.color = "green"; theTrangThai.innerText = "✅ " + ketQua.thongBao;
                          if (theNguonCongVan) {
                              const theDongGoc = theNguonCongVan.closest('tr');
                              theDongGoc.querySelector('.giaTriLienKet').value = ketQua.lienKetTep;
                              const mangLienKetLay = ketQua.lienKetTep.split(',').map(lk => lk.trim()).filter(lk => lk!=="");
                              theDongGoc.querySelector('.vungHienThiLienKet').innerHTML = mangLienKetLay.map((lk, chiSoM) => `<a href="${lk}" target="_blank" class="nutTaiMinhChung nutXemFile">📎 ${chiSoM + 1}</a>`).join('');
                              theNguonCongVan.innerHTML = '📝 Sửa/Thêm'; theNguonCongVan.style.borderColor = "#f59e0b";
                          }
                          setTimeout(dongHopThoaiTaiCongVan, 1000);
                      } else { theTrangThai.style.color = "red"; theTrangThai.innerText = "❌ " + ketQua.thongBao; nutBatDau.classList.add('dangMo'); }
                  }).khiCoLoi(loi => { theTrangThai.style.color = "red"; theTrangThai.innerText = "❌ Lỗi: " + loi.message; nutBatDau.classList.add('dangMo'); })
                  .taiThuMucMinhChung(idThuMucChon, tenThuMucMoiLuu, mangTepGhi, lienKetCuCongVan, cheDoGhiChon);
              }
          };
          boDocTep.readAsDataURL(tepItem);
      });
  }
</script>
