<div style="margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center;">
  <span style="font-weight:bold; font-size:15px; color:#1e3a8a;">👋 Mời chọn khoảng thời gian để xem lịch...</span>
</div>

<div style="background:#e0f2fe; padding:10px; border:1px solid #bae6fd; margin-bottom:10px; display:flex; flex-wrap:wrap; gap:10px; align-items:center;">
  <div style="display:flex; align-items:center; gap:5px; background:white; padding:3px; border-radius:4px; border:1px solid #ccc;">
      <span style="font-size:14px; font-weight:bold; padding-left:5px;">Từ:</span>
      <input type="text" id="tNgayL" placeholder="dd/mm/yyyy" maxlength="10" oninput="theTepL(this)" style="border:none; outline:none; width:90px; text-align:center;">
  </div>
  <div style="display:flex; align-items:center; gap:5px; background:white; padding:3px; border-radius:4px; border:1px solid #ccc;">
      <span style="font-size:14px; font-weight:bold; padding-left:5px;">Đến:</span>
      <input type="text" id="dNgayL" placeholder="dd/mm/yyyy" maxlength="10" oninput="theTepL(this)" style="border:none; outline:none; width:90px; text-align:center;">
  </div>
  <button onclick="taiDlTraCuuLich()" style="background:#2563eb; color:white; border:none; padding:5px 15px; border-radius:4px; font-weight:bold; cursor:pointer;">🔍 Tìm Lịch</button>
</div>

<div style="overflow-x: auto; max-height: 65vh;">
  <table class="bangHthi" id="bangXemLich">
    <thead style="position: sticky; top: 0; z-index: 10;">
      <tr>
        <th style="width:100px;">Ngày/Giờ</th>
        <th style="width:200px;">Nội dung</th>
        <th style="width:120px;">Địa điểm</th>
        <th style="width:150px;">Thành phần</th>
        <th style="width:120px;">Chủ trì</th>
        <th style="width:80px;">Tài liệu</th>
        <th style="width:60px;">Làm việc</th>
      </tr>
    </thead>
    <tbody id="tBodyXemLich">
      <tr><td colspan="7" style="text-align:center; font-style:italic; color:#666;">Chưa có dữ liệu</td></tr>
    </tbody>
  </table>
</div>

<script>
  let dlGocLich = [];
  
  function taiDlTraCuuLich() {
      document.getElementById('chuTai').innerText = "⏳ Đang lấy dữ liệu lịch...";
      document.getElementById('vungTai').style.display = 'flex';
      heThong.server.chay.voiKhiTcong(kq => {
          document.getElementById('vungTai').style.display = 'none';
          dlGocLich = kq; veBangLich();
      }).voiKhiLoi(l => {
          document.getElementById('vungTai').style.display = 'none'; hienTbao("Lỗi: " + l.message, "loi");
      }).cvLayDlLich();
  }

  function tachNgay(str) { 
      if(!str) return 0; 
      try { const p = str.split('/'); if(p.length < 3) return 0; return new Date(p[2], p[1]-1, p[0]).getTime(); } 
      catch(e) { return 0; } 
  }

  function veBangLich() {
      const tb = document.getElementById('tBodyXemLich'); tb.innerHTML = '';
      let nT = tachNgay(document.getElementById('tNgayL').value);
      let nD = tachNgay(document.getElementById('dNgayL').value);

      let dLoc = dlGocLich.filter(r => {
          let n = tachNgay(r[0]);
          if(nT > 0 && n < nT) return false;
          if(nD > 0 && n > nD) return false;
          return true;
      });

      dLoc.sort((a,b) => tachNgay(b[0]) - tachNgay(a[0]));

      if(dLoc.length === 0) { tb.innerHTML = '<tr><td colspan="7" style="text-align:center;">Không có lịch nào phù hợp!</td></tr>'; return; }

      dLoc.forEach(r => {
          let nutSua = qNhap ? `<button class="nutXoa" style="color:#0369a1; border-color:#38bdf8; background:#e0f2fe;" onclick="chuyenSangSuaLich(this, '${encodeURIComponent(JSON.stringify(r))}')" title="Sửa lịch này">✏️</button>` : '';
          let dsL = "";
          let lkT = r[6]; if(typeof lkT === 'object') lkT = lkT.url || "";
          if (lkT && lkT.trim() !== "") {
              let cls = lkT.split(',').map(l => l.trim()).filter(l => l !== "");
              dsL = cls.map((l, i) => `<a href="${l}" target="_blank" class="nutTaiMinhc nutXemFile">📎 ${i+1}</a>`).join('');
          }
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td style="text-align:center; font-weight:bold;">${r[0]}<br><span style="color:#0369a1;">${r[1]}</span></td>
            <td style="font-weight:bold;">${r[2]}</td>
            <td style="text-align:center;">${r[3]}</td>
            <td>${r[4]}</td>
            <td style="text-align:center; font-weight:bold; color:#b91c1c;">${r[5]}</td>
            <td style="text-align:center;">${dsL}</td>
            <td style="text-align:center;">${nutSua}</td>
          `;
          tb.appendChild(tr);
      });
  }

  function chuyenSangSuaLich(btn, mh) {
       try {
           const dG = JSON.parse(decodeURIComponent(mh));
           document.querySelectorAll('.noiDungTab').forEach(e => e.classList.remove('dangMo'));
           document.querySelectorAll('.nutChuyen').forEach(e => e.classList.remove('dangMo'));
           document.getElementById('tabLich').classList.add('dangMo');
           document.querySelectorAll('.nutChuyen')[0].classList.add('dangMo');
           themdongLich(dG);
           const tr = btn.closest('tr'); tr.style.backgroundColor = '#fef9c3'; setTimeout(() => tr.remove(), 500);
           hienTbao("Đã chuyển sang Nhập Lịch!", "tc");
       } catch(e) { hienTbao("Lỗi đọc dữ liệu!", "loi"); }
  }
</script>
